<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kasam</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF8F2;--or:#FF8C42;--orl:#FFB380;--orp:#FFF0E6;
  --tx:#3D2C1E;--ts:#9A7B6A;--wh:#FFFFFF;--bd:#F0E4D8;
  --gr:#52B788;--rd:#E07A5F;--sh:0 2px 16px rgba(255,140,66,0.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:88px;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{background:var(--or);padding:20px 20px 24px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr-top h1{font-size:20px;font-weight:800;color:#fff}
.mnav{display:flex;align-items:center;gap:8px}
.mnav button{background:rgba(255,255,255,0.25);border:none;border-radius:8px;color:#fff;width:32px;height:32px;font-size:18px;cursor:pointer}
.mlbl{color:#fff;font-weight:700;font-size:14px;min-width:108px;text-align:center}
.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sc{background:rgba(255,255,255,0.2);border-radius:12px;padding:10px 6px;text-align:center}
.sc .sl{font-size:10px;color:rgba(255,255,255,0.85);font-weight:700}
.sc .sv{font-size:15px;font-weight:800;color:#fff;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:6px;padding:14px 14px 0}
.tab{flex:1;padding:10px 2px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:var(--wh);color:var(--ts);box-shadow:var(--sh)}
.tab.active{background:var(--or);color:#fff}

/* PAGES */
.page{padding:12px 14px}

/* GOAL PANEL */
.gpanel{background:var(--wh);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.gpanel h3{font-size:13px;font-weight:800;margin-bottom:10px}
.gtabs{display:flex;gap:6px;margin-bottom:12px}
.gtab{flex:1;padding:6px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:var(--orp);color:var(--ts)}
.gtab.active{background:var(--or);color:#fff}
.ginfo{display:flex;justify-content:space-between;margin-bottom:6px}
.ginfo span{font-size:12px;color:var(--ts);font-weight:600}
.gpct{font-size:13px;font-weight:800;color:var(--or)}
.ptrack{height:13px;background:var(--orp);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--orl),var(--or));transition:width .5s ease}
.gdet{margin-top:7px;font-size:11px;color:var(--ts);text-align:right}

/* ADVICE */
.adv-wrap{margin-bottom:12px}
.sec-title{font-size:12px;font-weight:800;color:var(--ts);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.acard{border-radius:13px;padding:11px 13px;display:flex;align-items:flex-start;gap:9px;margin-bottom:7px}
.acard .ai{font-size:19px;flex-shrink:0;margin-top:1px}
.acard .at{font-size:13px;font-weight:600;line-height:1.45;color:var(--tx)}
.acard.green{background:#EAFAF3}.acard.yellow{background:#FFF8E1}.acard.orange{background:var(--orp)}.acard.red{background:#FDECEA}

/* CAT SUMMARY */
.cspanel{background:var(--wh);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.cstabs{display:flex;gap:6px;margin-bottom:12px}
.cstab{flex:1;padding:7px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:var(--orp);color:var(--ts)}
.cstab.active{background:var(--or);color:#fff}
.csrow{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.csico{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.csbw{flex:1}
.csname{font-size:12px;font-weight:700;color:var(--tx);display:flex;justify-content:space-between;margin-bottom:3px}
.csname span{font-weight:600;color:var(--ts)}
.cstrk{height:7px;background:var(--orp);border-radius:99px;overflow:hidden}
.csfill{height:100%;border-radius:99px;transition:width .4s ease}
.csfill.expense{background:linear-gradient(90deg,#FFB380,#E07A5F)}
.csfill.income{background:linear-gradient(90deg,#80D9AE,#52B788)}

/* TX LIST */
.txlist{display:flex;flex-direction:column;gap:8px}
.txi{background:var(--wh);border-radius:15px;padding:13px 14px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh)}
.txdot{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.txdot.income{background:#EAFAF3}.txdot.expense{background:#FDECEA}
.txbody{flex:1;min-width:0}
.txcat{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txnote{font-size:11px;color:var(--ts);margin-top:1px}
.txdate{font-size:10px;color:var(--ts);margin-top:2px}
.txamt{font-size:14px;font-weight:800;flex-shrink:0}
.txamt.income{color:var(--gr)}.txamt.expense{color:var(--rd)}
.txact{display:flex;gap:4px;flex-shrink:0}
.txbtn{background:none;border:none;cursor:pointer;padding:5px;border-radius:8px;font-size:16px}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(--ts)}
.empty .ei{font-size:42px;margin-bottom:10px}
.empty p{font-size:14px;font-weight:600}

/* CAT LIST */
.clist{display:flex;flex-direction:column;gap:8px}
.cli{background:var(--wh);border-radius:14px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.cli-l{display:flex;align-items:center;gap:10px}
.cli-ico{font-size:22px}
.cli-nm{font-size:14px;font-weight:700}
.cli-tp{font-size:11px;font-weight:600;margin-top:1px}
.cli-tp.income{color:var(--gr)}.cli-tp.expense{color:var(--rd)}
.cdel{background:none;border:none;cursor:pointer;font-size:16px;padding:5px}

/* GOAL FORM */
.gform{background:var(--wh);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.gform h3{font-size:14px;font-weight:800;margin-bottom:14px}

/* FORM */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px}
.fg input,.fg select{width:100%;padding:13px 13px;border-radius:13px;border:2px solid var(--bd);font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--tx);background:var(--bg);outline:none;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--or)}

/* TYPE TOGGLE */
.ttog{display:flex;gap:8px;margin-bottom:14px}
.tbtn{flex:1;padding:12px;border-radius:13px;border:2px solid var(--bd);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:var(--wh);color:var(--ts);display:flex;align-items:center;justify-content:center;gap:6px}
.tbtn.income.active{border-color:var(--gr);background:#EAFAF3;color:var(--gr)}
.tbtn.expense.active{border-color:var(--rd);background:#FDECEA;color:var(--rd)}

/* FAB */
.fab{position:fixed;bottom:92px;right:18px;z-index:100;width:54px;height:54px;border-radius:50%;border:none;background:var(--or);color:#fff;font-size:28px;box-shadow:0 4px 20px rgba(255,140,66,0.45);cursor:pointer;display:flex;align-items:center;justify-content:center}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--wh);padding:10px 0 20px;display:flex;border-top:1px solid var(--bd)}
.nbtn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:var(--ts)}
.nbtn.active{color:var(--or)}
.nbtn .ni{font-size:22px}

/* OVERLAY */
.ov{position:fixed;inset:0;z-index:200;background:rgba(61,44,30,0.35);display:none;align-items:flex-end;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.ov.open{display:flex}
.modal{background:var(--wh);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhnd{width:40px;height:4px;background:var(--bd);border-radius:99px;margin:0 auto 18px}
.modal h2{font-size:18px;font-weight:800;margin-bottom:18px}
.mbtn{width:100%;padding:15px;border-radius:15px;border:none;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;background:var(--or);color:#fff;cursor:pointer;margin-top:6px}
.mbtn.sec{background:var(--orp);color:var(--or);margin-top:10px}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--tx);color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <h1>Kasam</h1>
    <div class="mnav">
      <button onclick="chMon(-1)">&#8249;</button>
      <span class="mlbl" id="mlbl"></span>
      <button onclick="chMon(1)">&#8250;</button>
    </div>
  </div>
  <div class="srow">
    <div class="sc"><div class="sl">Gelir</div><div class="sv" id="hInc">0</div></div>
    <div class="sc"><div class="sl">Gider</div><div class="sv" id="hExp">0</div></div>
    <div class="sc"><div class="sl">Net</div><div class="sv" id="hNet">0</div></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-home" onclick="goTab('home')">Ozet</button>
  <button class="tab" id="tab-list" onclick="goTab('list')">Islemler</button>
  <button class="tab" id="tab-cats" onclick="goTab('cats')">Kategoriler</button>
  <button class="tab" id="tab-goals" onclick="goTab('goals')">Hedef</button>
</div>

<!-- HOME -->
<div class="page" id="pg-home">
  <div class="gpanel">
    <h3>Birikim Hedefi</h3>
    <div class="gtabs">
      <button class="gtab active" id="gt-m" onclick="setGV('monthly')">Aylik</button>
      <button class="gtab" id="gt-y" onclick="setGV('yearly')">Yillik</button>
    </div>
    <div class="ginfo"><span id="ginfoL">Hedef yok</span><span class="gpct" id="gpct">--</span></div>
    <div class="ptrack"><div class="pfill" id="pbar" style="width:0%"></div></div>
    <div class="gdet" id="gdet"></div>
  </div>
  <div class="adv-wrap">
    <div class="sec-title">Akilli Tavsiyeler</div>
    <div id="advEl"></div>
  </div>
</div>

<!-- LIST -->
<div class="page" id="pg-list" style="display:none">
  <div class="cspanel" id="cspanel">
    <div class="sec-title">Kategori Ozeti</div>
    <div class="cstabs">
      <button class="cstab active" id="cst-e" onclick="setCSV('expense')">Giderler</button>
      <button class="cstab" id="cst-i" onclick="setCSV('income')">Gelirler</button>
    </div>
    <div id="csrows"></div>
  </div>
  <div class="sec-title" id="ltitle"></div>
  <div class="txlist" id="txlist"></div>
  <div class="empty" id="emptyEl" style="display:none"><div class="ei">🌿</div><p>Bu ay hic islem yok.</p></div>
</div>

<!-- CATS -->
<div class="page" id="pg-cats" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="sec-title" style="margin-bottom:0">Kategorilerim</div>
    <button class="mbtn" style="width:auto;padding:8px 16px;font-size:13px;margin:0" onclick="openCatMod()">+ Yeni</button>
  </div>
  <div class="clist" id="catListEl"></div>
</div>

<!-- GOALS -->
<div class="page" id="pg-goals" style="display:none">
  <div class="gform">
    <h3>Aylik Birikim Hedefi</h3>
    <div class="fg"><label>Hedef Tutar (TL)</label><input type="number" id="gInpM" placeholder="ornek: 5000" inputmode="numeric"></div>
    <button class="mbtn" onclick="saveGoal('monthly')">Kaydet</button>
  </div>
  <div class="gform">
    <h3>Yillik Birikim Hedefi</h3>
    <div class="fg"><label>Hedef Tutar (TL)</label><input type="number" id="gInpY" placeholder="ornek: 60000" inputmode="numeric"></div>
    <button class="mbtn" onclick="saveGoal('yearly')">Kaydet</button>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openTxMod(null)">+</button>

<!-- BOTTOM NAV -->
<div class="bnav">
  <button class="nbtn active" id="nav-home" onclick="goTab('home')"><span class="ni">🏠</span>Ozet</button>
  <button class="nbtn" id="nav-list" onclick="goTab('list')"><span class="ni">📋</span>Islemler</button>
  <button class="nbtn" id="nav-cats" onclick="goTab('cats')"><span class="ni">🗂</span>Kategoriler</button>
  <button class="nbtn" id="nav-goals" onclick="goTab('goals')"><span class="ni">🎯</span>Hedef</button>
</div>

<!-- TX MODAL -->
<div class="ov" id="txOv" onclick="ovClick(event,'txOv')">
  <div class="modal">
    <div class="mhnd"></div>
    <h2 id="txMTitle">Yeni Islem</h2>
    <div class="ttog">
      <button class="tbtn income active" id="tInc" onclick="setTT('income')">Gelir</button>
      <button class="tbtn expense" id="tExp" onclick="setTT('expense')">Gider</button>
    </div>
    <div class="fg"><label>Kategori</label><select id="txCat"></select></div>
    <div class="fg"><label>Tutar (TL)</label><input type="number" id="txAmt" placeholder="0" inputmode="decimal"></div>
    <div class="fg"><label>Tarih</label><input type="date" id="txDt"></div>
    <div class="fg"><label>Not (opsiyonel)</label><input type="text" id="txNote" placeholder="Aciklama..."></div>
    <button class="mbtn" onclick="saveTx()">Kaydet</button>
    <button class="mbtn sec" onclick="closeMod('txOv')">Iptal</button>
  </div>
</div>

<!-- CAT MODAL -->
<div class="ov" id="catOv" onclick="ovClick(event,'catOv')">
  <div class="modal">
    <div class="mhnd"></div>
    <h2>Yeni Kategori</h2>
    <div class="ttog">
      <button class="tbtn income active" id="ctInc" onclick="setCT('income')">Gelir</button>
      <button class="tbtn expense" id="ctExp" onclick="setCT('expense')">Gider</button>
    </div>
    <div class="fg"><label>Emoji</label><input type="text" id="catEmo" placeholder="🎯" maxlength="4"></div>
    <div class="fg"><label>Kategori Adi</label><input type="text" id="catNm" placeholder="Market, Maas..."></div>
    <button class="mbtn" onclick="saveCat()">Kaydet</button>
    <button class="mbtn sec" onclick="closeMod('catOv')">Iptal</button>
  </div>
</div>

<script>
var MONTHS = ['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
var d = JSON.parse(localStorage.getItem('gg_data') || '{"transactions":[],"categories":[],"goals":{}}');
var cy = new Date().getFullYear();
var cm = new Date().getMonth();
var cTab = 'home';
var editId = null;
var txType = 'income';
var catType = 'income';
var gv = 'monthly';
var csv = 'expense';

function sv() { localStorage.setItem('gg_data', JSON.stringify(d)); }

function fmtN(n) {
  var abs = Math.abs(n);
  return 'TL ' + abs.toLocaleString('tr-TR', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function chMon(dir) {
  cm += dir;
  if (cm > 11) { cm = 0; cy++; }
  if (cm < 0) { cm = 11; cy--; }
  render();
}

function mTxs() {
  return d.transactions.filter(function(t) {
    var dt = new Date(t.date + 'T12:00:00');
    return dt.getFullYear() === cy && dt.getMonth() === cm;
  });
}

function yTxs() {
  return d.transactions.filter(function(t) {
    return new Date(t.date + 'T12:00:00').getFullYear() === cy;
  });
}

function sumType(arr, type) {
  return arr.filter(function(t){return t.type===type;}).reduce(function(s,t){return s+t.amount;},0);
}

function render() {
  document.getElementById('mlbl').textContent = MONTHS[cm] + ' ' + cy;
  var txs = mTxs();
  var inc = sumType(txs, 'income');
  var exp = sumType(txs, 'expense');
  var net = inc - exp;
  document.getElementById('hInc').textContent = fmtN(inc);
  document.getElementById('hExp').textContent = fmtN(exp);
  document.getElementById('hNet').textContent = fmtN(net);
  renderGoal(inc, exp, net);
  renderAdvice(inc, exp, net, txs);
  renderList(txs);
  renderCats();
  renderGoalInputs();
}

function setGV(v) {
  gv = v;
  document.getElementById('gt-m').className = 'gtab' + (v==='monthly'?' active':'');
  document.getElementById('gt-y').className = 'gtab' + (v==='yearly'?' active':'');
  var txs = mTxs();
  var inc = sumType(txs,'income'); var exp = sumType(txs,'expense');
  renderGoal(inc, exp, inc-exp);
}

function renderGoal(inc, exp, net) {
  var isM = gv === 'monthly';
  var goal = isM ? (d.goals.monthly||0) : (d.goals.yearly||0);
  var saved, lbl;
  if (isM) {
    saved = net > 0 ? net : 0;
    lbl = 'Bu ay birikimim';
  } else {
    var yt = yTxs();
    saved = Math.max(0, sumType(yt,'income') - sumType(yt,'expense'));
    lbl = cy + ' birikimim';
  }
  if (!goal) {
    document.getElementById('ginfoL').textContent = 'Hedef belirlenmedi';
    document.getElementById('gpct').textContent = '--';
    document.getElementById('pbar').style.width = '0%';
    document.getElementById('gdet').textContent = 'Hedef sekmesinden hedef belirleyin';
    return;
  }
  var pct = Math.min(100, Math.round(saved/goal*100));
  document.getElementById('ginfoL').textContent = lbl + ': ' + fmtN(saved);
  document.getElementById('gpct').textContent = '%' + pct;
  document.getElementById('pbar').style.width = pct + '%';
  var rem = goal - saved;
  document.getElementById('gdet').textContent = rem > 0 ? ('Hedefe ' + fmtN(rem) + ' kaldi') : 'Hedefe ulastin!';
}

function renderAdvice(inc, exp, net, txs) {
  var cards = [];
  var today = new Date();
  var isCur = today.getFullYear()===cy && today.getMonth()===cm;
  var dom = today.getDate();
  var dim = new Date(cy, cm+1, 0).getDate();
  var dleft = isCur ? (dim - dom) : 0;

  if (!txs.length) {
    cards.push({c:'orange', i:'💡', t:'Henuz islem yok. Gelir ve giderlerini ekleyince tavsiyeler burada gorunecek.'});
  } else {
    if (isCur && dleft > 0 && inc > 0) {
      var db = Math.round(net / dleft);
      if (db > 0) cards.push({c:'green', i:'✅', t:'Gunluk harcama limitin yaklasik ' + fmtN(db) + '. Butcen saglikli gorunuyor!'});
      else if (db < 0) cards.push({c:'red', i:'⚠️', t:'Harcamalar gelirinizi asiyor! Gunluk ' + fmtN(Math.abs(db)) + ' acik var.'});
      else cards.push({c:'yellow', i:'⚖️', t:'Butcen tam dengede. Ekstra harcamalardan kacin.'});
    }
    if (isCur && dleft <= 5 && dleft > 0) {
      cards.push({c:'yellow', i:'⏳', t:'Ayin bitmesine ' + dleft + ' gun kaldi. Son virajdasin, dikkatli ol!'});
    }
    if (net > 0 && isCur) {
      var extra = Math.round(net * 0.2);
      if (extra > 200) cards.push({c:'green', i:'🎉', t:'Artidasin! Keyif icin ' + fmtN(extra) + ' ayirabilirsin, gerisini birikime ekle.'});
    }
    if (inc > 0) {
      var ratio = exp / inc;
      if (ratio > 0.85) cards.push({c:'red', i:'🔴', t:'Giderler gelirinizin %' + Math.round(ratio*100) + ' orani. Cok yuksek — buyuk kalemleri gozden gecir.'});
      else if (ratio < 0.5) cards.push({c:'green', i:'💚', t:'Harika! Gelirinizin sadece %' + Math.round(ratio*100) + ' ini harciyorsunuz.'});
    }
    var mg = d.goals.monthly || 0;
    if (mg > 0 && isCur && dleft > 0) {
      var needed = mg - Math.max(0, net);
      if (needed > 0) cards.push({c:'orange', i:'🎯', t:'Aylik hedefe ulasmak icin kalan ' + dleft + ' gunde gunluk ' + fmtN(Math.round(needed/dleft)) + ' biriktirmen gerekiyor.'});
      else cards.push({c:'green', i:'🏆', t:'Aylik birikim hedefindesin!'});
    }
  }

  var html = '';
  for (var i=0; i<cards.length; i++) {
    html += '<div class="acard ' + cards[i].c + '"><div class="ai">' + cards[i].i + '</div><div class="at">' + cards[i].t + '</div></div>';
  }
  document.getElementById('advEl').innerHTML = html;
}

function setCSV(v) {
  csv = v;
  document.getElementById('cst-e').className = 'cstab' + (v==='expense'?' active':'');
  document.getElementById('cst-i').className = 'cstab' + (v==='income'?' active':'');
  renderCatSum(mTxs());
}

function renderCatSum(txs) {
  var filtered = txs.filter(function(t){return t.type===csv;});
  var panel = document.getElementById('cspanel');
  var el = document.getElementById('csrows');
  if (!filtered.length) { panel.style.display='none'; return; }
  panel.style.display='';

  var map = {};
  filtered.forEach(function(t){ map[t.catId] = (map[t.catId]||0) + t.amount; });
  var total = 0;
  for (var k in map) total += map[k];
  var entries = [];
  for (var k in map) entries.push([k, map[k]]);
  entries.sort(function(a,b){return b[1]-a[1];});

  var html = '';
  for (var i=0; i<entries.length; i++) {
    var catId = entries[i][0];
    var sum = entries[i][1];
    var cat = null;
    for (var j=0; j<d.categories.length; j++) { if (d.categories[j].id===catId) { cat=d.categories[j]; break; } }
    var icon = cat ? cat.emoji : (csv==='income'?'💰':'💸');
    var name = cat ? cat.name : '--';
    var pct = total > 0 ? Math.round(sum/total*100) : 0;
    html += '<div class="csrow">';
    html += '<div class="csico">' + icon + '</div>';
    html += '<div class="csbw">';
    html += '<div class="csname">' + esc(name) + '<span>' + fmtN(sum) + ' %' + pct + '</span></div>';
    html += '<div class="cstrk"><div class="csfill ' + csv + '" style="width:' + pct + '%"></div></div>';
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function renderList(txs) {
  var sorted = txs.slice().sort(function(a,b){return new Date(b.date+' 12:00')-new Date(a.date+' 12:00');});
  var el = document.getElementById('txlist');
  var em = document.getElementById('emptyEl');
  document.getElementById('ltitle').textContent = MONTHS[cm] + ' ' + cy + ' Islemleri';

  if (!sorted.length) {
    el.innerHTML = '';
    em.style.display = '';
    document.getElementById('cspanel').style.display = 'none';
    return;
  }
  em.style.display = 'none';
  renderCatSum(txs);

  var html = '';
  for (var i=0; i<sorted.length; i++) {
    var t = sorted[i];
    var cat = null;
    for (var j=0; j<d.categories.length; j++) { if (d.categories[j].id===t.catId) { cat=d.categories[j]; break; } }
    var icon = cat ? cat.emoji : (t.type==='income'?'💰':'💸');
    var catName = cat ? cat.name : '--';
    var dt = new Date(t.date + 'T12:00:00');
    var ds = dt.toLocaleDateString('tr-TR', {day:'2-digit',month:'short'});
    var sign = t.type==='income' ? '+' : '-';
    html += '<div class="txi">';
    html += '<div class="txdot ' + t.type + '">' + icon + '</div>';
    html += '<div class="txbody">';
    html += '<div class="txcat">' + esc(catName) + '</div>';
    if (t.note) html += '<div class="txnote">' + esc(t.note) + '</div>';
    html += '<div class="txdate">' + ds + '</div>';
    html += '</div>';
    html += '<div class="txamt ' + t.type + '">' + sign + fmtN(t.amount) + '</div>';
    html += '<div class="txact">';
    html += '<button class="txbtn" onclick="openTxMod(\'' + t.id + '\')">&#9999;&#65039;</button>';
    html += '<button class="txbtn" onclick="delTx(\'' + t.id + '\')">&#128465;</button>';
    html += '</div>';
    html += '</div>';
  }
  el.innerHTML = html;
}

function renderCats() {
  var el = document.getElementById('catListEl');
  if (!d.categories.length) {
    el.innerHTML = '<div class="empty"><div class="ei">🗂</div><p>Henuz kategori yok.</p></div>';
    return;
  }
  var html = '';
  for (var i=0; i<d.categories.length; i++) {
    var c = d.categories[i];
    var tp = c.type==='income' ? 'Gelir' : 'Gider';
    html += '<div class="cli">';
    html += '<div class="cli-l"><div class="cli-ico">' + c.emoji + '</div>';
    html += '<div><div class="cli-nm">' + esc(c.name) + '</div>';
    html += '<div class="cli-tp ' + c.type + '">' + tp + '</div></div></div>';
    html += '<button class="cdel" onclick="delCat(\'' + c.id + '\')">&#128465;</button>';
    html += '</div>';
  }
  el.innerHTML = html;
}

function renderGoalInputs() {
  var m = document.getElementById('gInpM');
  var y = document.getElementById('gInpY');
  if (d.goals.monthly) m.value = d.goals.monthly;
  if (d.goals.yearly) y.value = d.goals.yearly;
}

function saveGoal(type) {
  var inp = document.getElementById(type==='monthly'?'gInpM':'gInpY');
  var val = parseFloat(inp.value);
  if (!val || val<=0) { toast('Gecerli tutar girin'); return; }
  d.goals[type] = val;
  sv(); toast('Hedef kaydedildi!'); render();
}

function openTxMod(id) {
  editId = id;
  document.getElementById('txMTitle').textContent = id ? 'Islemi Duzenle' : 'Yeni Islem';
  if (id) {
    var t = null;
    for (var i=0; i<d.transactions.length; i++) { if (d.transactions[i].id===id) { t=d.transactions[i]; break; } }
    setTT(t.type);
    fillCatSel(t.catId);
    document.getElementById('txAmt').value = t.amount;
    document.getElementById('txDt').value = t.date;
    document.getElementById('txNote').value = t.note||'';
  } else {
    setTT('income');
    fillCatSel(null);
    document.getElementById('txAmt').value = '';
    document.getElementById('txDt').value = new Date().toISOString().split('T')[0];
    document.getElementById('txNote').value = '';
  }
  document.getElementById('txOv').className = 'ov open';
}

function setTT(t) {
  txType = t;
  document.getElementById('tInc').className = 'tbtn income' + (t==='income'?' active':'');
  document.getElementById('tExp').className = 'tbtn expense' + (t==='expense'?' active':'');
  fillCatSel(null);
}

function fillCatSel(selId) {
  var sel = document.getElementById('txCat');
  var cats = d.categories.filter(function(c){return c.type===txType;});
  if (!cats.length) { sel.innerHTML = '<option value="">-- Once kategori ekle --</option>'; return; }
  var html = '';
  for (var i=0; i<cats.length; i++) {
    var c = cats[i];
    html += '<option value="' + c.id + '"' + (c.id===selId?' selected':'') + '>' + c.emoji + ' ' + c.name + '</option>';
  }
  sel.innerHTML = html;
}

function saveTx() {
  var catId = document.getElementById('txCat').value;
  var amt = parseFloat(document.getElementById('txAmt').value);
  var dt = document.getElementById('txDt').value;
  var note = document.getElementById('txNote').value.trim();
  if (!catId) { toast('Kategori secin'); return; }
  if (!amt || amt<=0) { toast('Gecerli tutar girin'); return; }
  if (!dt) { toast('Tarih secin'); return; }
  if (editId) {
    for (var i=0; i<d.transactions.length; i++) {
      if (d.transactions[i].id===editId) {
        d.transactions[i].type=txType; d.transactions[i].catId=catId;
        d.transactions[i].amount=amt; d.transactions[i].date=dt; d.transactions[i].note=note;
        break;
      }
    }
  } else {
    d.transactions.push({id:Date.now().toString(), type:txType, catId:catId, amount:amt, date:dt, note:note});
  }
  sv(); closeMod('txOv'); toast(editId?'Guncellendi':'Eklendi'); editId=null; render();
}

function delTx(id) {
  if (!confirm('Bu islemi sil?')) return;
  d.transactions = d.transactions.filter(function(t){return t.id!==id;});
  sv(); render(); toast('Silindi');
}

function openCatMod() {
  setCT('income');
  document.getElementById('catEmo').value='';
  document.getElementById('catNm').value='';
  document.getElementById('catOv').className='ov open';
}

function setCT(t) {
  catType=t;
  document.getElementById('ctInc').className='tbtn income'+(t==='income'?' active':'');
  document.getElementById('ctExp').className='tbtn expense'+(t==='expense'?' active':'');
}

function saveCat() {
  var name = document.getElementById('catNm').value.trim();
  var emoji = document.getElementById('catEmo').value.trim() || (catType==='income'?'💰':'💸');
  if (!name) { toast('Kategori adi girin'); return; }
  for (var i=0; i<d.categories.length; i++) {
    if (d.categories[i].name.toLowerCase()===name.toLowerCase() && d.categories[i].type===catType) {
      toast('Bu kategori zaten var'); return;
    }
  }
  d.categories.push({id:Date.now().toString(), type:catType, name:name, emoji:emoji});
  sv(); closeMod('catOv'); toast('Kategori eklendi'); render();
}

function delCat(id) {
  for (var i=0; i<d.transactions.length; i++) {
    if (d.transactions[i].catId===id) { toast('Bu kategoride islem var, silinemez'); return; }
  }
  if (!confirm('Kategoriyi sil?')) return;
  d.categories = d.categories.filter(function(c){return c.id!==id;});
  sv(); render(); toast('Silindi');
}

function closeMod(id) { document.getElementById(id).className='ov'; }
function ovClick(e,id) { if (e.target===document.getElementById(id)) closeMod(id); }

function goTab(t) {
  cTab=t;
  var pages=['home','list','cats','goals'];
  for (var i=0; i<pages.length; i++) {
    document.getElementById('pg-'+pages[i]).style.display = pages[i]===t?'':'none';
    document.getElementById('tab-'+pages[i]).className='tab'+(pages[i]===t?' active':'');
    document.getElementById('nav-'+pages[i]).className='nbtn'+(pages[i]===t?' active':'');
  }
  var fab=document.getElementById('fabBtn');
  if (t==='cats') { fab.style.display='flex'; fab.onclick=function(){openCatMod();}; }
  else if (t==='goals') { fab.style.display='none'; }
  else { fab.style.display='flex'; fab.onclick=function(){openTxMod(null);}; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show';
  setTimeout(function(){el.className='toast';},2200);
}

render();
</script>
</body>
</html>
