<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gelir Gider Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFF8F2;
    --orange: #FF8C42;
    --orange-light: #FFB380;
    --orange-pale: #FFF0E6;
    --orange-mid: #FFCCA8;
    --text: #3D2C1E;
    --text-soft: #9A7B6A;
    --white: #FFFFFF;
    --border: #F0E4D8;
    --green: #52B788;
    --red: #E07A5F;
    --shadow: 0 2px 16px rgba(255,140,66,0.10);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    background: var(--orange);
    padding: 20px 20px 28px;
    position: sticky; top: 0; z-index: 50;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .header h1 { font-size: 20px; font-weight: 800; color: var(--white); }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav button {
    background: rgba(255,255,255,0.25); border: none; border-radius: 8px;
    color: var(--white); width: 32px; height: 32px; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .month-label { color: var(--white); font-weight: 700; font-size: 15px; min-width: 110px; text-align: center; }

  .summary-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .summary-card {
    background: rgba(255,255,255,0.22); border-radius: 14px;
    padding: 10px 8px; text-align: center;
  }
  .summary-card .s-label { font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 600; }
  .summary-card .s-val { font-size: 16px; font-weight: 800; color: var(--white); margin-top: 2px; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 6px; padding: 16px 16px 0; }
  .tab {
    flex: 1; padding: 10px 4px; border: none; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .2s;
    background: var(--white); color: var(--text-soft);
    box-shadow: var(--shadow);
  }
  .tab.active { background: var(--orange); color: var(--white); }

  /* ── SECTION ── */
  .section { padding: 12px 16px; }

  /* ── GOAL BAR ── */
  .goal-panel {
    background: var(--white); border-radius: 18px; padding: 16px;
    margin: 12px 16px 0; box-shadow: var(--shadow);
  }
  .goal-panel .gp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .goal-panel h3 { font-size: 14px; font-weight: 800; color: var(--text); }
  .goal-panel .gp-edit { background: none; border: none; color: var(--orange); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .goal-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .goal-tab { flex: 1; padding: 5px; border-radius: 8px; border: none; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--orange-pale); color: var(--text-soft); }
  .goal-tab.active { background: var(--orange); color: var(--white); }
  .goal-info { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .goal-info span { font-size: 12px; color: var(--text-soft); font-weight: 600; }
  .goal-info .goal-pct { font-size: 13px; font-weight: 800; color: var(--orange); }
  .progress-track { height: 14px; background: var(--orange-pale); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--orange-light), var(--orange));
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .goal-detail { margin-top: 8px; font-size: 11px; color: var(--text-soft); text-align: right; }

  /* ── ADVICE PANEL ── */
  .advice-panel { margin: 10px 16px 0; }
  .advice-panel h3 { font-size: 13px; font-weight: 800; color: var(--text-soft); margin-bottom: 8px; padding-left: 2px; }
  .advice-cards { display: flex; flex-direction: column; gap: 8px; }
  .advice-card {
    border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .advice-card .ac-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .advice-card .ac-text { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .advice-card.green { background: #EAFAF3; }
  .advice-card.yellow { background: #FFF8E1; }
  .advice-card.orange { background: var(--orange-pale); }
  .advice-card.red { background: #FDECEA; }

  /* ── TRANSACTION LIST ── */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: var(--white); border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow);
    position: relative;
  }
  .tx-dot { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .tx-dot.income { background: #EAFAF3; }
  .tx-dot.expense { background: #FDECEA; }
  .tx-body { flex: 1; min-width: 0; }
  .tx-cat { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-note { font-size: 11px; color: var(--text-soft); margin-top: 1px; }
  .tx-date { font-size: 10px; color: var(--text-soft); margin-top: 2px; }
  .tx-amount { font-size: 15px; font-weight: 800; flex-shrink: 0; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .tx-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .tx-btn {
    background: none; border: none; cursor: pointer; padding: 4px;
    border-radius: 8px; font-size: 15px;
  }
  .tx-btn:hover { background: var(--orange-pale); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-soft); }
  .empty-state .es-icon { font-size: 44px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; font-weight: 600; }

  /* ── CATEGORY SUMMARY ── */
  .cat-summary-panel {
    background: var(--white); border-radius: 18px; padding: 16px;
    margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .cat-summary-title {
    font-size: 12px; font-weight: 800; color: var(--text-soft);
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px;
  }
  .cat-sum-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .cat-sum-tab {
    flex: 1; padding: 6px; border-radius: 8px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; background: var(--orange-pale); color: var(--text-soft);
  }
  .cat-sum-tab.active { background: var(--orange); color: var(--white); }
  .cat-sum-rows { display: flex; flex-direction: column; gap: 7px; }
  .cat-sum-row { display: flex; align-items: center; gap: 10px; }
  .cat-sum-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
  .cat-sum-bar-wrap { flex: 1; }
  .cat-sum-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; display: flex; justify-content: space-between; }
  .cat-sum-name span { font-weight: 600; color: var(--text-soft); }
  .cat-sum-track { height: 7px; background: var(--orange-pale); border-radius: 99px; overflow: hidden; }
  .cat-sum-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
  .cat-sum-fill.expense { background: linear-gradient(90deg, #FFB380, #E07A5F); }
  .cat-sum-fill.income { background: linear-gradient(90deg, #80D9AE, #52B788); }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 90px; right: 20px; z-index: 100;
    width: 56px; height: 56px; border-radius: 50%; border: none;
    background: var(--orange); color: var(--white); font-size: 28px;
    box-shadow: 0 4px 20px rgba(255,140,66,0.45);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .15s;
  }
  .fab:active { transform: scale(.93); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--white); padding: 10px 0 20px;
    display: flex; border-top: 1px solid var(--border);
    box-shadow: 0 -2px 16px rgba(255,140,66,0.08);
  }
  .nav-btn {
    flex: 1; border: none; background: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700;
    color: var(--text-soft); padding: 4px 0;
  }
  .nav-btn.active { color: var(--orange); }
  .nav-btn .nav-icon { font-size: 22px; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; z-index: 200; background: rgba(61,44,30,0.35);
    display: none; align-items: flex-end; backdrop-filter: blur(3px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 24px 24px 0 0;
    padding: 20px 20px 40px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 18px; }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }

  .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-btn {
    flex: 1; padding: 12px; border-radius: 14px; border: 2px solid var(--border);
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; background: var(--white); color: var(--text-soft);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s;
  }
  .type-btn.income.active { border-color: var(--green); background: #EAFAF3; color: var(--green); }
  .type-btn.expense.active { border-color: var(--red); background: #FDECEA; color: var(--red); }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-soft); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 13px 14px; border-radius: 14px;
    border: 2px solid var(--border); font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--text); background: var(--bg);
    outline: none; transition: border .15s; appearance: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--orange); }

  .cat-row { display: flex; gap: 8px; }
  .cat-row select { flex: 1; }
  .cat-add-btn {
    width: 48px; height: 48px; border-radius: 14px; border: 2px solid var(--border);
    background: var(--bg); font-size: 22px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; margin-top: 0;
  }
  .cat-add-btn:active { background: var(--orange-pale); }

  .modal-btn {
    width: 100%; padding: 15px; border-radius: 16px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
    background: var(--orange); color: var(--white); cursor: pointer;
    margin-top: 6px; transition: opacity .15s;
  }
  .modal-btn:active { opacity: .85; }
  .modal-btn.secondary {
    background: var(--orange-pale); color: var(--orange); margin-top: 10px;
  }

  /* ── CATEGORIES PAGE ── */
  .cat-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-list-item {
    background: var(--white); border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow);
  }
  .cat-list-item .cli-left { display: flex; align-items: center; gap: 10px; }
  .cat-list-item .cli-icon { font-size: 22px; }
  .cat-list-item .cli-name { font-size: 14px; font-weight: 700; }
  .cat-list-item .cli-type { font-size: 11px; font-weight: 600; margin-top: 1px; }
  .cat-list-item .cli-type.income { color: var(--green); }
  .cat-list-item .cli-type.expense { color: var(--red); }
  .cat-del { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; }

  /* ── GOAL PAGE ── */
  .goal-form { background: var(--white); border-radius: 18px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 12px; }
  .goal-form h3 { font-size: 14px; font-weight: 800; margin-bottom: 14px; color: var(--text); }

  /* Section title */
  .section-title { font-size: 13px; font-weight: 800; color: var(--text-soft); margin-bottom: 10px; }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--text); color: var(--white); padding: 10px 20px;
    border-radius: 99px; font-size: 13px; font-weight: 700; z-index: 999;
    transition: transform .3s;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <h1>💰 Kasam</h1>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="summary-row">
    <div class="summary-card">
      <div class="s-label">Gelir</div>
      <div class="s-val" id="hdrIncome">₺0</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Gider</div>
      <div class="s-val" id="hdrExpense">₺0</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Net</div>
      <div class="s-val" id="hdrNet">₺0</div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('home')" id="tab-home">🏠 Özet</button>
  <button class="tab" onclick="switchTab('list')" id="tab-list">📋 İşlemler</button>
  <button class="tab" onclick="switchTab('cats')" id="tab-cats">🗂 Kategoriler</button>
  <button class="tab" onclick="switchTab('goals')" id="tab-goals">🎯 Hedef</button>
</div>

<!-- ── HOME TAB ── -->
<div id="page-home">
  <!-- Goal Bar -->
  <div class="goal-panel">
    <div class="gp-header">
      <h3>🎯 Birikim Hedefi</h3>
      <div class="goal-tabs">
        <button class="goal-tab active" id="gbt-monthly" onclick="switchGoalView('monthly')">Aylık</button>
        <button class="goal-tab" id="gbt-yearly" onclick="switchGoalView('yearly')">Yıllık</button>
      </div>
    </div>
    <div class="goal-info">
      <span id="goalInfoLeft">Hedef yok</span>
      <span class="goal-pct" id="goalPct">—</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="goalBar" style="width:0%"></div></div>
    <div class="goal-detail" id="goalDetail"></div>
  </div>

  <!-- Advice -->
  <div class="advice-panel" style="margin-top:14px;">
    <div class="section-title">📊 Akıllı Tavsiyeler</div>
    <div class="advice-cards" id="adviceCards"></div>
  </div>
</div>

<!-- ── LIST TAB ── -->
<div id="page-list" style="display:none">
  <div class="section">
    <!-- Category Summary -->
    <div class="cat-summary-panel" id="catSummaryPanel">
      <div class="cat-summary-title">Kategori Özeti</div>
      <div class="cat-sum-tabs">
        <button class="cat-sum-tab active" id="cst-expense" onclick="setCatSumView('expense')">🔴 Giderler</button>
        <button class="cat-sum-tab" id="cst-income" onclick="setCatSumView('income')">✅ Gelirler</button>
      </div>
      <div class="cat-sum-rows" id="catSumRows"></div>
    </div>

    <div class="section-title" id="listTitle">İşlemler</div>
    <div class="tx-list" id="txList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="es-icon">🌿</div>
      <p>Bu ay hiç işlem yok.</p>
    </div>
  </div>
</div>

<!-- ── CATS TAB ── -->
<div id="page-cats" style="display:none">
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div class="section-title" style="margin-bottom:0">Kategorilerim</div>
      <button class="modal-btn" style="width:auto;padding:8px 16px;font-size:13px" onclick="openCatModal()">+ Yeni</button>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>
</div>

<!-- ── GOALS TAB ── -->
<div id="page-goals" style="display:none">
  <div class="section">
    <div class="goal-form">
      <h3>📅 Aylık Birikim Hedefi</h3>
      <div class="form-group">
        <label>Hedef Tutar (₺)</label>
        <input type="number" id="goalMonthlyInput" placeholder="ör. 5000" inputmode="numeric">
      </div>
      <button class="modal-btn" onclick="saveGoal('monthly')">Kaydet</button>
    </div>
    <div class="goal-form">
      <h3>📆 Yıllık Birikim Hedefi</h3>
      <div class="form-group">
        <label>Hedef Tutar (₺)</label>
        <input type="number" id="goalYearlyInput" placeholder="ör. 60000" inputmode="numeric">
      </div>
      <button class="modal-btn" onclick="saveGoal('yearly')">Kaydet</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openTxModal()" id="fabBtn">+</button>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('home')" id="nav-home"><span class="nav-icon">🏠</span>Özet</button>
  <button class="nav-btn" onclick="switchTab('list')" id="nav-list"><span class="nav-icon">📋</span>İşlemler</button>
  <button class="nav-btn" onclick="switchTab('cats')" id="nav-cats"><span class="nav-icon">🗂</span>Kategoriler</button>
  <button class="nav-btn" onclick="switchTab('goals')" id="nav-goals"><span class="nav-icon">🎯</span>Hedef</button>
</div>

<!-- ── TX MODAL ── -->
<div class="overlay" id="txOverlay" onclick="closeOnOverlay(event,'txOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="txModalTitle">Yeni İşlem</h2>

    <div class="type-toggle">
      <button class="type-btn income active" id="typeIncome" onclick="setType('income')">✅ Gelir</button>
      <button class="type-btn expense" id="typeExpense" onclick="setType('expense')">🔴 Gider</button>
    </div>

    <div class="form-group">
      <label>Kategori</label>
      <div class="cat-row">
        <select id="txCat"></select>
      </div>
    </div>

    <div class="form-group">
      <label>Tutar (₺)</label>
      <input type="number" id="txAmount" placeholder="0" inputmode="decimal">
    </div>

    <div class="form-group">
      <label>Tarih</label>
      <input type="date" id="txDate">
    </div>

    <div class="form-group">
      <label>Not (opsiyonel)</label>
      <input type="text" id="txNote" placeholder="Açıklama...">
    </div>

    <button class="modal-btn" onclick="saveTx()">Kaydet</button>
    <button class="modal-btn secondary" onclick="closeModal('txOverlay')">İptal</button>
  </div>
</div>

<!-- ── CAT MODAL ── -->
<div class="overlay" id="catOverlay" onclick="closeOnOverlay(event,'catOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Yeni Kategori</h2>

    <div class="type-toggle">
      <button class="type-btn income active" id="catTypeIncome" onclick="setCatType('income')">✅ Gelir</button>
      <button class="type-btn expense" id="catTypeExpense" onclick="setCatType('expense')">🔴 Gider</button>
    </div>

    <div class="form-group">
      <label>Emoji</label>
      <input type="text" id="catEmoji" placeholder="🎯" maxlength="4">
    </div>

    <div class="form-group">
      <label>Kategori Adı</label>
      <input type="text" id="catName" placeholder="ör. Market, Maaş...">
    </div>

    <button class="modal-btn" onclick="saveCat()">Kaydet</button>
    <button class="modal-btn secondary" onclick="closeModal('catOverlay')">İptal</button>
  </div>
</div>

<script>
// ── STATE ──
let data = JSON.parse(localStorage.getItem('gg_data') || '{"transactions":[],"categories":[],"goals":{}}');
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth(); // 0-indexed
let currentTab = 'home';
let editId = null;
let txType = 'income';
let catType = 'income';
let goalView = 'monthly';

const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function save() { localStorage.setItem('gg_data', JSON.stringify(data)); }

function fmt(n) {
  return '₺' + Math.abs(n).toLocaleString('tr-TR', {minimumFractionDigits:0, maximumFractionDigits:2});
}

// ── MONTH NAV ──
function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0) { curMonth = 11; curYear--; }
  render();
}

function monthTxs() {
  return data.transactions.filter(t => {
    const dt = new Date(t.date);
    return dt.getFullYear() === curYear && dt.getMonth() === curMonth;
  });
}

function yearTxs() {
  return data.transactions.filter(t => new Date(t.date).getFullYear() === curYear);
}

// ── RENDER ──
function render() {
  document.getElementById('monthLabel').textContent = MONTHS[curMonth] + ' ' + curYear;

  const txs = monthTxs();
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const net = income - expense;

  document.getElementById('hdrIncome').textContent = fmt(income);
  document.getElementById('hdrExpense').textContent = fmt(expense);
  document.getElementById('hdrNet').textContent = (net>=0?'':'-') + fmt(net);
  document.getElementById('hdrNet').style.color = net >= 0 ? '#EAFAF3' : '#FDECEA';

  renderGoalBar(income, expense, net);
  renderAdvice(income, expense, net, txs);
  renderList(txs);
  renderCats();
  renderGoalInputs();
}

// ── GOAL BAR ──
function switchGoalView(v) {
  goalView = v;
  document.getElementById('gbt-monthly').classList.toggle('active', v==='monthly');
  document.getElementById('gbt-yearly').classList.toggle('active', v==='yearly');
  const txs = monthTxs();
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  renderGoalBar(income, expense, income-expense);
}

function renderGoalBar(income, expense, net) {
  const isMonthly = goalView === 'monthly';
  const goal = isMonthly ? (data.goals.monthly||0) : (data.goals.yearly||0);

  let saved, label;
  if (isMonthly) {
    saved = net > 0 ? net : 0;
    label = 'Bu ay birikimim';
  } else {
    const ytxs = yearTxs();
    const yi = ytxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const ye = ytxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    saved = Math.max(0, yi - ye);
    label = curYear + ' birikimim';
  }

  if (!goal) {
    document.getElementById('goalInfoLeft').textContent = 'Hedef belirlenmedi';
    document.getElementById('goalPct').textContent = '—';
    document.getElementById('goalBar').style.width = '0%';
    document.getElementById('goalDetail').textContent = '🎯 sekmesinden hedef belirleyin';
    return;
  }

  const pct = Math.min(100, Math.round(saved/goal*100));
  document.getElementById('goalInfoLeft').textContent = label + ': ' + fmt(saved);
  document.getElementById('goalPct').textContent = '%' + pct;
  document.getElementById('goalBar').style.width = pct + '%';
  const rem = goal - saved;
  document.getElementById('goalDetail').textContent =
    rem > 0 ? 'Hedefe ' + fmt(rem) + ' kaldı' : '🎉 Hedefine ulaştın!';
}

// ── ADVICE ──
function renderAdvice(income, expense, net, txs) {
  const el = document.getElementById('adviceCards');
  const cards = [];
  const today = new Date();
  const isCurrentMonth = today.getFullYear()===curYear && today.getMonth()===curMonth;
  const dayOfMonth = today.getDate();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const daysLeft = isCurrentMonth ? (daysInMonth - dayOfMonth) : 0;

  if (!txs.length) {
    cards.push({cls:'orange', icon:'💡', text:'Henüz işlem yok. Gelir ve giderlerini ekleyince tavsiyeler burada görünecek.'});
  } else {
    // Daily limit
    if (isCurrentMonth && daysLeft > 0 && income > 0) {
      const dailyBudget = Math.round(net / daysLeft);
      if (dailyBudget > 0) {
        cards.push({cls:'green', icon:'✅', text:'Günlük harcama limitin yaklaşık ' + fmt(dailyBudget) + '. Bütçen sağlıklı görünüyor!'});
      } else if (dailyBudget === 0) {
        cards.push({cls:'yellow', icon:'⚖️', text:'Bütçen tam dengede. Ekstra harcamalardan kaçın.'});
      } else {
        cards.push({cls:'red', icon:'⚠️', text:'Harcamaların gelirinizi aşıyor! Günlük ' + fmt(Math.abs(dailyBudget)) + ' açık var.'});
      }
    }

    // Days warning
    if (isCurrentMonth && daysLeft <= 5 && daysLeft > 0) {
      cards.push({cls:'yellow', icon:'⏳', text:'Ayın bitmesine ' + daysLeft + ' gün kaldı. Son virajdasın, dikkatli ol!'});
    }

    // Surplus
    if (net > 0 && isCurrentMonth) {
      const extra = Math.round(net * 0.2);
      if (extra > 200) {
        cards.push({cls:'green', icon:'🎉', text:'Artıdasın! Keyif için ' + fmt(extra) + ' ayırabilirsin, geri kalanı birikimine ekle.'});
      }
    }

    // Expense ratio
    if (income > 0) {
      const ratio = expense / income;
      if (ratio > 0.85) {
        cards.push({cls:'red', icon:'🔴', text:'Giderlerin gelirinizin %' + Math.round(ratio*100) + "'u. Bu oran çok yüksek — büyük kalemlerini gözden geçir."});
      } else if (ratio < 0.5) {
        cards.push({cls:'green', icon:'💚', text:'Harika! Gelirinizin sadece %' + Math.round(ratio*100) + "'ini harcıyorsunuz. Birikim için mükemmel bir ay."});
      }
    }

    // Monthly goal check
    const mGoal = data.goals.monthly || 0;
    if (mGoal > 0 && isCurrentMonth && daysLeft > 0) {
      const needed = mGoal - Math.max(0, net);
      if (needed > 0) {
        const dailyNeeded = Math.round(needed / daysLeft);
        cards.push({cls:'orange', icon:'🎯', text:'Aylık hedefe ulaşmak için kalan ' + daysLeft + ' günde günlük ' + fmt(dailyNeeded) + ' biriktirmen gerekiyor.'});
      } else {
        cards.push({cls:'green', icon:'🏆', text:'Aylık birikim hedefindesin! Yıllık hedefe de göz at.'});
      }
    }
  }

  el.innerHTML = cards.map(c =>
    '<div class="advice-card ' + c.cls + '"><div class="ac-icon">' + c.icon + '</div><div class="ac-text">' + c.text + '</div></div>'
  ).join('');
}

// ── LIST ──
function renderList(txs) {
  const sorted = [...txs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el = document.getElementById('txList');
  const empty = document.getElementById('emptyState');
  document.getElementById('listTitle').textContent = MONTHS[curMonth] + ' ' + curYear + ' İşlemleri';

  if (!sorted.length) {
    el.innerHTML = '';
    empty.style.display = '';
    document.getElementById('catSummaryPanel').style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  renderCatSummary(txs);

  el.innerHTML = sorted.map(t => {
    const cat = data.categories.find(c=>c.id===t.catId);
    const icon = cat ? cat.emoji : (t.type==='income'?'💰':'💸');
    const catName = cat ? cat.name : '—';
    const dt = new Date(t.date + 'T12:00:00');
    const dateStr = dt.toLocaleDateString('tr-TR', {day:'2-digit',month:'short'});
    return `<div class="tx-item">
      <div class="tx-dot ${t.type}">${icon}</div>
      <div class="tx-body">
        <div class="tx-cat">${catName}</div>
        ${t.note ? '<div class="tx-note">' + escHtml(t.note) + '</div>' : ''}
        <div class="tx-date">${dateStr}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
      <div class="tx-actions">
        <button class="tx-btn" onclick="editTx('${t.id}')">✏️</button>
        <button class="tx-btn" onclick="deleteTx('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

let catSumView = 'expense';

function setCatSumView(v) {
  catSumView = v;
  document.getElementById('cst-expense').classList.toggle('active', v==='expense');
  document.getElementById('cst-income').classList.toggle('active', v==='income');
  renderCatSummary(monthTxs());
}

function renderCatSummary(txs) {
  const filtered = txs.filter(t => t.type === catSumView);
  const el = document.getElementById('catSumRows');
  const panel = document.getElementById('catSummaryPanel');

  if (!filtered.length) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';

  // Group by category
  const map = {};
  filtered.forEach(t => {
    map[t.catId] = (map[t.catId] || 0) + t.amount;
  });

  const total = Object.values(map).reduce((s,v)=>s+v,0);
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);

  el.innerHTML = sorted.map(([catId, sum]) => {
    const cat = data.categories.find(c=>c.id===catId);
    const icon = cat ? cat.emoji : (catSumView==='income'?'💰':'💸');
    const name = cat ? cat.name : '—';
    const pct = total > 0 ? Math.round(sum/total*100) : 0;
    return '<div class="cat-sum-row">' +
      '<div class="cat-sum-icon">' + icon + '</div>' +
      '<div class="cat-sum-bar-wrap">' +
        '<div class="cat-sum-name">' + escHtml(name) + '<span>' + fmt(sum) + ' · %' + pct + '</span></div>' +
        '<div class="cat-sum-track"><div class="cat-sum-fill ' + catSumView + '" style="width:' + pct + '%"></div></div>' +
      '</div>' +
    '</div>';
  }).join('');
}


// ── CATS ──
function renderCats() {
  const el = document.getElementById('catList');
  if (!data.categories.length) {
    el.innerHTML = '<div class="empty-state"><div class="es-icon">🗂</div><p>Henüz kategori yok. Ekle butonuna bas.</p></div>';
    return;
  }
  el.innerHTML = data.categories.map(c=>`
    <div class="cat-list-item">
      <div class="cli-left">
        <div class="cli-icon">${c.emoji}</div>
        <div>
          <div class="cli-name">${escHtml(c.name)}</div>
          <div class="cli-type ${c.type}">${c.type==='income'?'Gelir':'Gider'}</div>
        </div>
      </div>
      <button class="cat-del" onclick="deleteCat('${c.id}')">🗑</button>
    </div>
  `).join('');
}

// ── GOAL INPUTS ──
function renderGoalInputs() {
  const mi = document.getElementById('goalMonthlyInput');
  const yi = document.getElementById('goalYearlyInput');
  if (mi && data.goals.monthly) mi.value = data.goals.monthly;
  if (yi && data.goals.yearly) yi.value = data.goals.yearly;
}

function saveGoal(type) {
  const val = parseFloat(document.getElementById('goal' + (type==='monthly'?'Monthly':'Yearly') + 'Input').value);
  if (!val || val <= 0) { showToast('Geçerli bir tutar girin'); return; }
  data.goals[type] = val;
  save();
  showToast('Hedef kaydedildi!');
  render();
}

// ── TX MODAL ──
function openTxModal(id=null) {
  editId = id;
  const modal = document.getElementById('txOverlay');
  document.getElementById('txModalTitle').textContent = id ? 'İşlemi Düzenle' : 'Yeni İşlem';

  if (id) {
    const t = data.transactions.find(x=>x.id===id);
    setType(t.type);
    populateCatSelect(t.catId);
    document.getElementById('txAmount').value = t.amount;
    document.getElementById('txDate').value = t.date;
    document.getElementById('txNote').value = t.note || '';
  } else {
    setType('income');
    populateCatSelect();
    document.getElementById('txAmount').value = '';
    document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('txNote').value = '';
  }
  modal.classList.add('open');
}

function setType(t) {
  txType = t;
  document.getElementById('typeIncome').classList.toggle('active', t==='income');
  document.getElementById('typeExpense').classList.toggle('active', t==='expense');
  populateCatSelect();
}

function populateCatSelect(selectedId=null) {
  const sel = document.getElementById('txCat');
  const cats = data.categories.filter(c=>c.type===txType);
  if (!cats.length) {
    sel.innerHTML = '<option value="">— Önce kategori ekle —</option>';
    return;
  }
  sel.innerHTML = cats.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.emoji} ${c.name}</option>`).join('');
}

function saveTx() {
  const catId = document.getElementById('txCat').value;
  const amount = parseFloat(document.getElementById('txAmount').value);
  const date = document.getElementById('txDate').value;
  const note = document.getElementById('txNote').value.trim();

  if (!catId) { showToast('Kategori seçin'); return; }
  if (!amount || amount <= 0) { showToast('Geçerli tutar girin'); return; }
  if (!date) { showToast('Tarih seçin'); return; }

  if (editId) {
    const t = data.transactions.find(x=>x.id===editId);
    Object.assign(t, {type:txType, catId, amount, date, note});
  } else {
    data.transactions.push({id: Date.now().toString(), type:txType, catId, amount, date, note});
  }
  save();
  closeModal('txOverlay');
  showToast(editId ? 'İşlem güncellendi' : 'İşlem eklendi');
  editId = null;
  render();
}

function editTx(id) { openTxModal(id); }

function deleteTx(id) {
  if (!confirm('Bu işlemi silmek istiyor musun?')) return;
  data.transactions = data.transactions.filter(t=>t.id!==id);
  save(); render(); showToast('Silindi');
}

// ── CAT MODAL ──
function openCatModal() {
  setCatType('income');
  document.getElementById('catEmoji').value = '';
  document.getElementById('catName').value = '';
  document.getElementById('catOverlay').classList.add('open');
}

function setCatType(t) {
  catType = t;
  document.getElementById('catTypeIncome').classList.toggle('active', t==='income');
  document.getElementById('catTypeExpense').classList.toggle('active', t==='expense');
}

function saveCat() {
  const name = document.getElementById('catName').value.trim();
  const emoji = document.getElementById('catEmoji').value.trim() || (catType==='income'?'💰':'💸');
  if (!name) { showToast('Kategori adı girin'); return; }
  if (data.categories.some(c=>c.name.toLowerCase()===name.toLowerCase()&&c.type===catType)) {
    showToast('Bu kategori zaten var'); return;
  }
  data.categories.push({id: Date.now().toString(), type:catType, name, emoji});
  save(); closeModal('catOverlay'); showToast('Kategori eklendi'); render();
}

function deleteCat(id) {
  if (data.transactions.some(t=>t.catId===id)) {
    showToast('Bu kategoride işlem var, silinemez'); return;
  }
  if (!confirm('Kategoriyi sil?')) return;
  data.categories = data.categories.filter(c=>c.id!==id);
  save(); render(); showToast('Silindi');
}

// ── MODAL HELPERS ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOnOverlay(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ── TABS ──
function switchTab(t) {
  currentTab = t;
  ['home','list','cats','goals'].forEach(x => {
    document.getElementById('page-'+x).style.display = x===t ? '' : 'none';
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
    document.getElementById('nav-'+x).classList.toggle('active', x===t);
  });
  document.getElementById('fabBtn').style.display = (t==='list'||t==='home') ? '' : 'none';
  if (t==='list') document.getElementById('fabBtn').onclick = () => openTxModal();
  if (t==='cats') { document.getElementById('fabBtn').style.display=''; document.getElementById('fabBtn').onclick = () => openCatModal(); }
}

// ── TOAST ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── INIT ──
render();
</script>
</body>
</html>
